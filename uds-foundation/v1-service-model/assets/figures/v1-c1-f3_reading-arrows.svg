<svg class="dgm" viewBox="0 0 720 226" role="img" aria-label="How to read one sequence arrow. The tail sits on the side that acts (the tester); the head points at the side that is told (the ECU); moving down the page means moving forward in time. The same message is called request where it leaves and indication where it arrives.">
  <!-- time axis: down = later -->
  <text x="46" y="52" text-anchor="middle" class="mut mono-t" font-size="9.5">time</text>
  <path d="M 46 60 V 186 M 41 181 L 46 188 L 51 181" class="ln" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="46" y="204" text-anchor="middle" class="mut" font-size="9">later ↓</text>

  <!-- tester node (acts) -->
  <rect x="112" y="52" width="82" height="28" rx="6" class="fl acc-s" stroke-width="1.8"/>
  <text x="153" y="70" text-anchor="middle" class="acc w8" font-size="12">TESTER</text>
  <text x="153" y="38" text-anchor="middle" class="ink w7" font-size="10.5">the side that acts</text>
  <text x="153" y="24" text-anchor="middle" class="mut" font-size="9">動く側</text>

  <!-- ECU node (is told) -->
  <rect x="524" y="150" width="82" height="28" rx="6" class="fl grn-s" stroke-width="1.8"/>
  <text x="565" y="168" text-anchor="middle" class="grn w8" font-size="12">ECU</text>
  <text x="565" y="196" text-anchor="middle" class="ink w7" font-size="10.5">the side that is told</text>
  <text x="565" y="210" text-anchor="middle" class="mut" font-size="9">知らされる側</text>

  <!-- the arrow, descending: acts (upper-left) -> told (lower-right) -->
  <path d="M 153 82 L 521 150" class="acc-s" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M 512 143 L 523 151 L 510 153" class="acc-s" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle r="4" class="acc">
    <animateMotion dur="2.6s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.6;1" keyPoints="0;1;1" path="M 153 82 L 521 150"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.58;0.66;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- the same message, two names — kept clear of the descending arrow line -->
  <text x="212" y="134" class="acc mono-t" font-size="11">request</text>
  <text x="212" y="149" class="mut" font-size="9">where it leaves</text>
  <text x="488" y="106" text-anchor="end" class="acc mono-t" font-size="11">indication</text>
  <text x="488" y="121" text-anchor="end" class="mut" font-size="9">where it arrives</text>
</svg>
