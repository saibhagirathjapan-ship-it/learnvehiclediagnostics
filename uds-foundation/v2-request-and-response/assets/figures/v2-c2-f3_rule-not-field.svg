<svg class="dgm" viewBox="0 0 586 244" role="img" aria-label="A computed +0x40 rule derives the answer SID from the request for free and can never contradict it; a stored type field would cost one byte per message and could disagree with the SID.">
<text x="280" y="30" text-anchor="middle" class="ink w7" font-size="15">Computed each time — not stored as a byte</text><text x="30" y="52" class="mut mono-t w7" font-size="10.5">THE RULE — UDS</text><g><rect x="118" y="66" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="147" y="97.8" text-anchor="middle" class="ink mono-t" font-size="20">10</text></g><path d="M 182 91 H 236 M 230 86 L 236 91 L 230 96" class="ln" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="209" y="82" text-anchor="middle" class="acc mono-t" font-size="10.5">set bit 6</text><g><rect x="242" y="66" width="58" height="50" rx="0" class="plate tick" stroke-width="2.4"/><text x="271" y="97.8" text-anchor="middle" class="ink mono-t" font-size="20">50</text><circle cx="291" cy="75" r="6" class="plate tick" stroke-width="1.3"/><path d="M 288.3 75 l 1.7 1.9 L 294 72.4" class="tick" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><circle cx="320" cy="74" r="7" class="plate tick" stroke-width="1.3"/><path d="M 316.9 74 l 1.9 2.1 L 323.4 71" class="tick" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="333" y="78" class="ink" font-size="12">costs no extra byte</text><circle cx="320" cy="102" r="7" class="plate tick" stroke-width="1.3"/><path d="M 316.9 102 l 1.9 2.1 L 323.4 99" class="tick" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="333" y="106" class="ink" font-size="12">always agrees with the SID</text><text x="30" y="154" class="mut mono-t w7" font-size="10.5">A STORED FIELD</text><g><rect x="44" y="168" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="73" y="199.8" text-anchor="middle" class="ink mono-t" font-size="20">10</text></g><text x="113" y="199" text-anchor="middle" class="mut mono-t w8" font-size="18">+</text><rect x="132" y="168" width="58" height="50" class="plate cross" stroke-width="2.2" stroke-dasharray="5 4"/><text x="161" y="198" text-anchor="middle" class="mut mono-t" font-size="12">type</text><path d="M 196 193 H 236 M 230 188 L 236 193 L 230 198" class="ln" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><g><rect x="242" y="168" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="271" y="199.8" text-anchor="middle" class="ink mono-t" font-size="20">50</text></g><circle cx="320" cy="176" r="7" class="plate cross" stroke-width="1.3"/><path d="M 317.3 173.3 l 5.4 5.4 M 322.7 173.3 l -5.4 5.4" class="cross" stroke-width="1.6" stroke-linecap="round"/><text x="333" y="180" class="ink" font-size="12">one extra byte, every message</text><circle cx="320" cy="204" r="7" class="plate cross" stroke-width="1.3"/><path d="M 317.3 201.3 l 5.4 5.4 M 322.7 201.3 l -5.4 5.4" class="cross" stroke-width="1.6" stroke-linecap="round"/><text x="333" y="208" class="ink" font-size="12">could disagree with the SID</text>
