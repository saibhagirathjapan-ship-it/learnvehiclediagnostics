<svg class="dgm" viewBox="0 0 654 178" role="img" aria-label="A request runs a line of ordered checks: is the service known (fail 11h), is the sub-function known (fail 12h), is the length and format right (fail 13h). The first check to fail stops processing and returns its code; passing all three means a real, well-formed request that moves to the next gate.">
<g data-stage="1" data-until="1"><text x="327" y="28" text-anchor="middle" class="ink w7" font-size="15">The ECU checks in a fixed order</text></g><g data-stage="2" data-until="2"><text x="327" y="28" text-anchor="middle" class="ink w7" font-size="15">No such service → stop → 11h</text></g><g data-stage="3" data-until="3"><text x="327" y="28" text-anchor="middle" class="ink w7" font-size="15">Wrong sub-function or shape → 12h, 13h</text></g><g data-stage="4" data-until="4"><text x="327" y="28" text-anchor="middle" class="ink w7" font-size="15">Passed all → a real request</text></g><rect x="70" y="56" width="118" height="50" class="ln" stroke-width="1.8" fill="none"/><text x="129" y="77" text-anchor="middle" class="ink w7" font-size="12.5">service</text><text x="129" y="94" text-anchor="middle" class="ink w7" font-size="12.5">known?</text><rect x="222" y="56" width="118" height="50" class="ln" stroke-width="1.8" fill="none"/><text x="281" y="77" text-anchor="middle" class="ink w7" font-size="12.5">sub-function</text><text x="281" y="94" text-anchor="middle" class="ink w7" font-size="12.5">known?</text><rect x="374" y="56" width="118" height="50" class="ln" stroke-width="1.8" fill="none"/><text x="433" y="77" text-anchor="middle" class="ink w7" font-size="12.5">length &</text><text x="433" y="94" text-anchor="middle" class="ink w7" font-size="12.5">format ok?</text><text x="43" y="71" text-anchor="middle" class="mut mono-t" font-size="10">request</text><path d="M 18 81 H 68 M 62 76 L 68 81 L 62 86" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M 190 81 H 220 M 214 76 L 220 81 L 214 86" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M 342 81 H 372 M 366 76 L 372 81 L 366 86" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><g data-stage="2"><path d="M 129 106 V 128 M 124 123 L 129 128 L 134 123" class="red-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="129" y="145" text-anchor="middle" class="red mono-t w7" font-size="12">11h</text><text x="129" y="158" text-anchor="middle" class="mut" font-size="9">no such service</text></g><g data-stage="3"><path d="M 281 106 V 128 M 276 123 L 281 128 L 286 123" class="red-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="281" y="145" text-anchor="middle" class="red mono-t w7" font-size="12">12h</text><text x="281" y="158" text-anchor="middle" class="mut" font-size="9">no such sub-function</text><path d="M 433 106 V 128 M 428 123 L 433 128 L 438 123" class="red-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="433" y="145" text-anchor="middle" class="red mono-t w7" font-size="12">13h</text><text x="433" y="158" text-anchor="middle" class="mut" font-size="9">wrong length/format</text></g><g data-stage="4"><path d="M 494 81 H 532 M 526 76 L 532 81 L 526 86" class="tick" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="544" cy="81" r="6.5" class="plate tick" stroke-width="1.3"/><path d="M 540.7 81 l 1.9 2.1 L 547.4 78" class="tick" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="556" y="79" class="ink w7" font-size="11">real request</text><text x="556" y="94" class="mut" font-size="9.5">next gate → C4</text></g>
</svg>