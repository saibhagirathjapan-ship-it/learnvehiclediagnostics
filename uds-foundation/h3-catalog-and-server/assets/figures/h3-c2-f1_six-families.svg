<svg class="dgm" viewBox="0 0 720 256" role="img" aria-label="Every UDS service belongs to one of six families: communication management, data transmission, stored data (faults), input/output control, routine, and upload/download. Each family is one kind of job, named with its real service IDs.">
  <text x="360" y="26" text-anchor="middle" class="acc mono-t" font-size="10" letter-spacing="1.1">THE SIX FAMILIES OF SERVICES · 6つの族</text>

  <!-- tile 1 -->
  <rect x="40" y="54" width="214" height="84" rx="8" class="plate ln" stroke-width="1.3"/>
  <text x="240" y="76" text-anchor="end" class="acc mono-t" font-size="11">1</text>
  <text x="56" y="80" class="ink w7" font-size="11.5">Communication mgmt</text>
  <rect x="56" y="94" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="71" y="107" text-anchor="middle" class="ink mono-t" font-size="10">10</text>
  <rect x="92" y="94" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="107" y="107" text-anchor="middle" class="ink mono-t" font-size="10">11</text>
  <rect x="128" y="94" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="143" y="107" text-anchor="middle" class="ink mono-t" font-size="10">3E</text>
  <text x="56" y="128" class="mut" font-size="9">steer the conversation</text>

  <!-- tile 2 -->
  <rect x="268" y="54" width="214" height="84" rx="8" class="plate ln" stroke-width="1.3"/>
  <text x="468" y="76" text-anchor="end" class="acc mono-t" font-size="11">2</text>
  <text x="284" y="80" class="ink w7" font-size="11.5">Data transmission</text>
  <rect x="284" y="94" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="299" y="107" text-anchor="middle" class="ink mono-t" font-size="10">22</text>
  <rect x="320" y="94" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="335" y="107" text-anchor="middle" class="ink mono-t" font-size="10">2E</text>
  <text x="284" y="128" class="mut" font-size="9">read &amp; write named values</text>

  <!-- tile 3 -->
  <rect x="496" y="54" width="214" height="84" rx="8" class="plate ln" stroke-width="1.3"/>
  <text x="696" y="76" text-anchor="end" class="acc mono-t" font-size="11">3</text>
  <text x="512" y="80" class="ink w7" font-size="11.5">Stored data · faults</text>
  <rect x="512" y="94" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="527" y="107" text-anchor="middle" class="ink mono-t" font-size="10">19</text>
  <rect x="548" y="94" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="563" y="107" text-anchor="middle" class="ink mono-t" font-size="10">14</text>
  <text x="512" y="128" class="mut" font-size="9">read &amp; clear faults</text>

  <!-- tile 4 -->
  <rect x="40" y="150" width="214" height="84" rx="8" class="plate ln" stroke-width="1.3"/>
  <text x="240" y="172" text-anchor="end" class="acc mono-t" font-size="11">4</text>
  <text x="56" y="176" class="ink w7" font-size="11.5">Input / output control</text>
  <rect x="56" y="190" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="71" y="203" text-anchor="middle" class="ink mono-t" font-size="10">2F</text>
  <text x="56" y="224" class="mut" font-size="9">force a signal directly</text>

  <!-- tile 5 -->
  <rect x="268" y="150" width="214" height="84" rx="8" class="plate ln" stroke-width="1.3"/>
  <text x="468" y="172" text-anchor="end" class="acc mono-t" font-size="11">5</text>
  <text x="284" y="176" class="ink w7" font-size="11.5">Routine</text>
  <rect x="284" y="190" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="299" y="203" text-anchor="middle" class="ink mono-t" font-size="10">31</text>
  <text x="284" y="224" class="mut" font-size="9">run a built-in procedure</text>

  <!-- tile 6 -->
  <rect x="496" y="150" width="214" height="84" rx="8" class="plate ln" stroke-width="1.3"/>
  <text x="696" y="172" text-anchor="end" class="acc mono-t" font-size="11">6</text>
  <text x="512" y="176" class="ink w7" font-size="11.5">Upload / download</text>
  <rect x="512" y="190" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="527" y="203" text-anchor="middle" class="ink mono-t" font-size="10">34</text>
  <rect x="548" y="190" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="563" y="203" text-anchor="middle" class="ink mono-t" font-size="10">36</text>
  <rect x="584" y="190" width="30" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="599" y="203" text-anchor="middle" class="ink mono-t" font-size="10">37</text>
  <text x="512" y="224" class="mut" font-size="9">move a block of memory</text>

  <text x="360" y="250" text-anchor="middle" class="mut" font-size="8.5">security is a guard across all six — not a seventh family (next card)</text>
</svg>
