<svg class="dgm" viewBox="0 0 720 205" role="img" aria-label="Three atomic diagnostic primitives — read a fault (19), read live data (22), and an actuator test (2F) — each returns one piece of information. Arrows carry all three into a single node, the diagnosis, where the pieces are combined to find the root cause of the problem.">
  <text x="360" y="22" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="1">ATOMIC PRIMITIVES → THE DIAGNOSIS · 原子的情報から診断へ</text>

  <text x="40" y="46" class="mut" font-size="9">atomic primitives · one piece of information each</text>

  <!-- primitive 1 -->
  <rect x="40" y="56" width="232" height="34" rx="7" class="plate ln" stroke-width="1.3"/>
  <rect x="49" y="68" width="10" height="10" rx="1.6" class="fl ln" stroke-width="1"/><circle cx="54" cy="73" r="1.5" class="mut"/>
  <text x="70" y="77" class="ink" font-size="10.5">read a fault</text>
  <rect x="168" y="64" width="28" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="182" y="77" text-anchor="middle" class="ink mono-t" font-size="9.5">19</text>
  <text x="266" y="77" text-anchor="end" class="acc mono-t" font-size="8.5">→ M3</text>

  <!-- primitive 2 -->
  <rect x="40" y="100" width="232" height="34" rx="7" class="plate ln" stroke-width="1.3"/>
  <rect x="49" y="112" width="10" height="10" rx="1.6" class="fl ln" stroke-width="1"/><circle cx="54" cy="117" r="1.5" class="mut"/>
  <text x="70" y="121" class="ink" font-size="10.5">read live data</text>
  <rect x="168" y="108" width="28" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="182" y="121" text-anchor="middle" class="ink mono-t" font-size="9.5">22</text>
  <text x="266" y="121" text-anchor="end" class="acc mono-t" font-size="8.5">→ M2</text>

  <!-- primitive 3 -->
  <rect x="40" y="144" width="232" height="34" rx="7" class="plate ln" stroke-width="1.3"/>
  <rect x="49" y="156" width="10" height="10" rx="1.6" class="fl ln" stroke-width="1"/><circle cx="54" cy="161" r="1.5" class="mut"/>
  <text x="70" y="165" class="ink" font-size="10.5">actuator test</text>
  <rect x="168" y="152" width="28" height="18" rx="3" class="plate ln" stroke-width="1"/><text x="182" y="165" text-anchor="middle" class="ink mono-t" font-size="9.5">2F</text>
  <text x="266" y="165" text-anchor="end" class="acc mono-t" font-size="8.5">→ M5</text>

  <!-- converge into the diagnosis -->
  <path d="M 272 73 L 446 117" class="ln" stroke-width="1.5" fill="none"/>
  <path d="M 272 117 L 446 117" class="ln" stroke-width="1.5" fill="none"/>
  <path d="M 272 161 L 446 117" class="ln" stroke-width="1.5" fill="none"/>
  <circle cx="446" cy="117" r="3" class="lnf"/>
  <path d="M 446 117 H 470 M 463 113 L 470 117 L 463 121" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- the diagnosis (focal) -->
  <rect x="470" y="72" width="222" height="90" rx="10" class="plate acc-s" stroke-width="1.8"/>
  <text x="581" y="97" text-anchor="middle" class="acc w7" font-size="12.5">The Diagnosis</text>
  <rect x="557" y="108" width="16" height="16" rx="2" class="fl acc-s" stroke-width="1.3"/><circle cx="565" cy="116" r="1.6" class="acc"/>
  <rect x="573" y="108" width="16" height="16" rx="2" class="fl acc-s" stroke-width="1.3"/><circle cx="581" cy="116" r="1.6" class="acc"/>
  <rect x="589" y="108" width="16" height="16" rx="2" class="fl acc-s" stroke-width="1.3"/><circle cx="597" cy="116" r="1.6" class="acc"/>
  <text x="581" y="146" text-anchor="middle" class="mut" font-size="9">the pieces, combined → the root cause</text>
</svg>
