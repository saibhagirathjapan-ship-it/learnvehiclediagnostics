<svg class="dgm" viewBox="0 0 564 226" role="img" aria-label="The request byte 10 in bits has bit 6 unused; setting bit 6 makes the byte 50 — that fixed step is +0x40, and it works for every service.">
<g data-stage="1" data-until="1"><text x="282" y="30" text-anchor="middle" class="ink w7" font-size="15">Make 10 into its own answer — for free</text></g><g data-stage="2" data-until="2"><text x="282" y="30" text-anchor="middle" class="ink w7" font-size="15">Bit 6 is never used — it is free</text></g><g data-stage="3" data-until="3"><text x="282" y="30" text-anchor="middle" class="ink w7" font-size="15">Set bit 6: 10 becomes 50</text></g><g data-stage="4"><text x="282" y="30" text-anchor="middle" class="ink w7" font-size="15">One rule, every service</text></g><rect x="44" y="66" width="40" height="44" class="ln" stroke-width="1.6" fill="none"/><text x="64" y="94" text-anchor="middle" class="mut mono-t" font-size="18">0</text><text x="64" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 7</text><rect x="90" y="66" width="40" height="44" class="acc-s" stroke-width="2.4" fill="none"/><g data-until="2"><text x="110" y="94" text-anchor="middle" class="mut mono-t" font-size="18">0</text></g><g data-stage="3"><rect x="92" y="68" width="36" height="40" class="acc" opacity="0.16"/><text x="110" y="94" text-anchor="middle" class="acc mono-t w8" font-size="18">1</text></g><text x="110" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 6</text><rect x="136" y="66" width="40" height="44" class="ln" stroke-width="1.6" fill="none"/><text x="156" y="94" text-anchor="middle" class="mut mono-t" font-size="18">0</text><text x="156" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 5</text><rect x="182" y="66" width="40" height="44" class="ln" stroke-width="1.6" fill="none"/><text x="202" y="94" text-anchor="middle" class="ink mono-t" font-size="18">1</text><text x="202" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 4</text><rect x="228" y="66" width="40" height="44" class="ln" stroke-width="1.6" fill="none"/><text x="248" y="94" text-anchor="middle" class="mut mono-t" font-size="18">0</text><text x="248" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 3</text><rect x="274" y="66" width="40" height="44" class="ln" stroke-width="1.6" fill="none"/><text x="294" y="94" text-anchor="middle" class="mut mono-t" font-size="18">0</text><text x="294" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 2</text><rect x="320" y="66" width="40" height="44" class="ln" stroke-width="1.6" fill="none"/><text x="340" y="94" text-anchor="middle" class="mut mono-t" font-size="18">0</text><text x="340" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 1</text><rect x="366" y="66" width="40" height="44" class="ln" stroke-width="1.6" fill="none"/><text x="386" y="94" text-anchor="middle" class="mut mono-t" font-size="18">0</text><text x="386" y="125" text-anchor="middle" class="mut" font-size="9.5">bit 0</text><text x="430" y="95" text-anchor="middle" class="mut mono-t w8" font-size="20">=</text><g data-until="2"><g><rect x="452" y="63" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="481" y="94.8" text-anchor="middle" class="ink mono-t" font-size="20">10</text></g></g><g data-stage="3"><g><rect x="452" y="63" width="58" height="50" rx="0" class="plate tick" stroke-width="2.4"/><text x="481" y="94.8" text-anchor="middle" class="ink mono-t" font-size="20">50</text><circle cx="501" cy="72" r="6" class="plate tick" stroke-width="1.3"/><path d="M 498.3 72 l 1.7 1.9 L 504 69.4" class="tick" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g></g><g data-stage="3"><text x="481" y="130" text-anchor="middle" class="acc mono-t w7" font-size="12">= 10 + 0x40</text></g><g data-stage="2" data-until="2"><path d="M 110 132 V 140" class="acc-s" stroke-width="1.4"/><text x="110" y="152" text-anchor="middle" class="acc mono-t" font-size="11">unused — free</text></g><g data-stage="3"><path d="M 110 132 V 140" class="acc-s" stroke-width="1.4"/><text x="110" y="152" text-anchor="middle" class="acc mono-t w7" font-size="11">set it</text></g><g data-stage="4"><path d="M 44 162 H 520" class="ln" stroke-width="1"/><text x="282" y="190" text-anchor="middle" class="ink w7" font-size="13.5">bit 6 = 0 → a request      bit 6 = 1 → its positive reply</text><text x="282" y="212" text-anchor="middle" class="acc mono-t w7" font-size="12.5">22 → 62   ·   3E → 7E   ·   27 → 67</text></g>
</svg>