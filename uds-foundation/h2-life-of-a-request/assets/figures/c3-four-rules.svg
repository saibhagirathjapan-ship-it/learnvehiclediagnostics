<svg class="dgm" viewBox="0 0 720 236" role="img" aria-label="Four rules hold around every request. One: a request goes to one ECU or all, but the answer comes from one. Two: 3E TesterPresent holds the session open, or it times out. Three: faults log to a separate store, the Dem. Four: an 11 reset returns to the default session and re-locks security.">
  <text x="360" y="23" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="1.2">AROUND EVERY BEAT · どの1拍にも</text>

  <!-- ==== Tile 1: addressing ==== -->
  <rect x="24" y="38" width="326" height="88" rx="9" class="plate ln" stroke-width="1.2"/>
  <circle cx="48" cy="82" r="4.5" class="acc"/>
  <path d="M 52 82 L 92 65" class="acc-s" stroke-width="1.3" opacity="0.42"/>
  <path d="M 52 82 L 91.5 82" class="acc-s" stroke-width="1.5"/>
  <path d="M 52 82 L 92 99" class="acc-s" stroke-width="1.3" opacity="0.42"/>
  <circle cx="98" cy="65" r="6" class="fl ln" stroke-width="1.2"/>
  <circle cx="98" cy="82" r="6.5" class="fl grn-s" stroke-width="1.7"/>
  <circle cx="98" cy="99" r="6" class="fl ln" stroke-width="1.2"/>
  <text x="126" y="77" class="ink w7" font-size="13">One ECU, or all</text>
  <text x="126" y="97" class="mut" font-size="10.5">the answer comes from one</text>

  <!-- ==== Tile 2: $3E keep-alive ==== -->
  <rect x="370" y="38" width="326" height="88" rx="9" class="plate ln" stroke-width="1.2"/>
  <circle cx="414" cy="81" r="13" class="fl ln" stroke-width="1.4"/>
  <path d="M 414 81 L 414 72" class="ln" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M 414 81 L 421 83" class="ln" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="414" cy="81" r="1.6" class="lnf"/>
  <path d="M 414 63 A 18 18 0 1 1 396 81" class="acc-s" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <path d="M 396 81 l -1 -6 m 1 6 l 6 -1" class="acc-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="462" y="77" class="ink w7" font-size="13"><tspan class="acc mono-t">$3E</tspan> holds it open</text>
  <text x="462" y="97" class="mut" font-size="10.5">or it quietly times out</text>

  <!-- ==== Tile 3: faults log elsewhere ==== -->
  <rect x="24" y="142" width="326" height="88" rx="9" class="plate ln" stroke-width="1.2"/>
  <rect x="42" y="178" width="16" height="16" rx="2" class="fl ln" stroke-width="1.2"/>
  <path d="M 60 186 H 82" class="ln" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="84" y="172" width="30" height="28" rx="2.5" class="plate ln" stroke-width="1.4"/>
  <path d="M 84 181 H 114" class="ln" stroke-width="1"/>
  <path d="M 99 176.5 L 105 187 L 93 187 Z" class="ln" stroke-width="1.4" fill="none"/>
  <text x="99" y="186.5" text-anchor="middle" class="mut w7" font-size="7">!</text>
  <text x="126" y="181" class="ink w7" font-size="13">Faults log elsewhere</text>
  <text x="126" y="201" class="mut" font-size="10.5">a separate store (Dem)</text>

  <!-- ==== Tile 4: $11 reset ==== -->
  <rect x="370" y="142" width="326" height="88" rx="9" class="plate ln" stroke-width="1.2"/>
  <path d="M 410 172 A 12 12 0 1 1 398 184" class="acc-s" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <path d="M 398 184 l -1 -6 m 1 6 l 6 -1" class="acc-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 424 186 H 429" class="ln" stroke-width="1.3"/>
  <path d="M 433 186 v-3 a4 4 0 0 1 8 0 v3" class="amb-s" stroke-width="1.5" fill="none"/>
  <rect x="430" y="186" width="14" height="11" rx="1.5" class="fl amb-s" stroke-width="1.3"/>
  <circle cx="437" cy="191" r="1.3" class="amb"/>
  <text x="462" y="181" class="ink w7" font-size="13"><tspan class="acc mono-t">$11</tspan> → default + lock</text>
  <text x="462" y="201" class="mut" font-size="10.5">as if just powered on</text>
</svg>
