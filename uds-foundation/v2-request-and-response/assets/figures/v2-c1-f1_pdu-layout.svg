<svg class="dgm" viewBox="0 0 488 194" role="img" aria-label="The reply bytes have no seams at first; a control header A_PCI (first byte = the key), the parameters, and a Length build the seams — together one A_PDU.">
<g data-until="1"><text x="244" y="36" text-anchor="middle" class="ink w7" font-size="16">Just a stream — no seams marked</text><text x="244" y="162" text-anchor="middle" class="mut" font-size="12.5">where does the service end?   ·   how long is it?</text></g><g><rect x="40" y="80" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="69" y="111.8" text-anchor="middle" class="ink mono-t" font-size="20">50</text></g><g><rect x="110" y="80" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="139" y="111.8" text-anchor="middle" class="ink mono-t" font-size="20">03</text></g><g><rect x="180" y="80" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="209" y="111.8" text-anchor="middle" class="ink mono-t" font-size="20">00</text></g><g><rect x="250" y="80" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="279" y="111.8" text-anchor="middle" class="ink mono-t" font-size="20">32</text></g><g><rect x="320" y="80" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="349" y="111.8" text-anchor="middle" class="ink mono-t" font-size="20">01</text></g><g><rect x="390" y="80" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="419" y="111.8" text-anchor="middle" class="ink mono-t" font-size="20">F4</text></g><g data-stage="2"><text x="69" y="66" text-anchor="middle" class="acc mono-t w7" font-size="12">A_PCI</text><text x="69" y="150" text-anchor="middle" class="acc" font-size="11.5">first byte = the key</text></g><g data-stage="3"><text x="279" y="66" text-anchor="middle" class="mut mono-t w7" font-size="12">parameters</text></g><g data-stage="4"><path d="M 40 156 V 164 H 448 V 156" class="ln" stroke-width="1.5" fill="none"/><text x="244" y="184" text-anchor="middle" class="ink mono-t" font-size="13">Length = 6 bytes</text><text x="244" y="36" text-anchor="middle" class="acc w7" font-size="16">= one A_PDU (a wrapped unit)</text></g>
</svg>