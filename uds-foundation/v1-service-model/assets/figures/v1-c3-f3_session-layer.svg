<svg class="dgm" viewBox="0 0 720 256" role="img" aria-label="One layer down. The application layer holds the rich four-step call with its A_ parameters. It hands the call down to the session layer, which offers only three plain calls: S_Data.request (send this), S_Data.indication (this arrived), and S_Data.confirm (send finished). The rich label rides down as the session layer's address fields.">
  <defs>
    <radialGradient id="glowSD" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.30"/>
      <stop offset="70%" stop-color="var(--accent)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- application layer -->
  <rect x="90" y="26" width="540" height="82" rx="10" class="fl acc-s" stroke-width="2"/>
  <text x="110" y="50" class="acc w8" font-size="13">APPLICATION LAYER</text>
  <text x="262" y="50" class="mut" font-size="10">— where the four-step model lives</text>
  <text x="360" y="88" text-anchor="middle" class="mut mono-t" font-size="10.5">service.request ( A_Mtype, A_SA, A_TA, … )</text>

  <!-- hand-down -->
  <path d="M 360 110 V 162 M 355 157 L 360 164 L 365 157" class="ln" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="374" y="140" class="mut mono-t" font-size="9">hands the call down · 下へ渡す</text>
  <circle r="4" class="acc">
    <animateMotion dur="2.6s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.5;1" keyPoints="0;1;1" path="M 360 112 L 360 162"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.48;0.56;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- session layer -->
  <rect x="90" y="166" width="540" height="82" rx="10" class="fl ln" stroke-width="1.8"/>
  <text x="110" y="190" class="ink w8" font-size="13">SESSION LAYER</text>
  <text x="238" y="190" class="mut" font-size="10">— just three plain calls</text>

  <circle cx="182" cy="223" r="30" fill="url(#glowSD)">
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.5;0.6;0.74;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <rect x="108" y="204" width="150" height="38" rx="6" class="fl acc-s" stroke-width="1.5"/>
  <text x="183" y="222" text-anchor="middle" class="acc mono-t w7" font-size="10.5">S_Data.request</text>
  <text x="183" y="235" text-anchor="middle" class="mut" font-size="8.5">send this</text>
  <rect x="268" y="204" width="150" height="38" rx="6" class="fl ln" stroke-width="1.5"/>
  <text x="343" y="222" text-anchor="middle" class="ink mono-t w7" font-size="10.5">S_Data.indication</text>
  <text x="343" y="235" text-anchor="middle" class="mut" font-size="8.5">this arrived</text>
  <rect x="428" y="204" width="150" height="38" rx="6" class="fl ln" stroke-width="1.5"/>
  <text x="503" y="222" text-anchor="middle" class="ink mono-t w7" font-size="10.5">S_Data.confirm</text>
  <text x="503" y="235" text-anchor="middle" class="mut" font-size="8.5">send finished</text>
</svg>
