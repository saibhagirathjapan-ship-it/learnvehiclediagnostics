<svg class="dgm" viewBox="0 0 720 190" role="img" aria-label="A request read byte by byte: the two bytes 10 and 03. The first byte, 10, is the Service Identifier — which service. The second byte, 03, is the sub-function — which option. Together they read as a string of bytes, first byte first.">
  <text x="34" y="25" class="acc mono-t" font-size="10" letter-spacing="1">A REQUEST · BYTE BY BYTE</text>

  <!-- annotations above each byte -->
  <text x="309" y="30" text-anchor="middle" class="mut mono-t" font-size="9.5">which service</text>
  <path d="M 309 46 V 35" class="ln" stroke-width="1"/>
  <text x="413" y="30" text-anchor="middle" class="mut mono-t" font-size="9.5">which option</text>
  <path d="M 413 46 V 35" class="ln" stroke-width="1"/>

  <!-- byte 1 = SID (accent-marked) -->
  <rect x="262" y="46" width="94" height="86" rx="7" class="plate ln" stroke-width="1.5"/>
  <rect x="262" y="46" width="94" height="3" class="acc"/>
  <text x="309" y="97" text-anchor="middle" class="acc w8" font-size="33">10</text>
  <line x1="272" y1="108" x2="346" y2="108" class="ln" stroke-width="1"/>
  <text x="309" y="125" text-anchor="middle" class="acc mono-t" font-size="11">SID</text>

  <!-- byte 2 = sub-function -->
  <rect x="366" y="46" width="94" height="86" rx="7" class="plate ln" stroke-width="1.5"/>
  <rect x="366" y="46" width="94" height="3" class="lnf"/>
  <text x="413" y="97" text-anchor="middle" class="ink w8" font-size="33">03</text>
  <line x1="376" y1="108" x2="450" y2="108" class="ln" stroke-width="1"/>
  <text x="413" y="125" text-anchor="middle" class="mut mono-t" font-size="11">SUB-FN</text>

  <!-- bracket: one string of bytes -->
  <path d="M 262 150 V 156 H 460 V 150" class="ln" stroke-width="1.2" fill="none"/>
  <text x="361" y="176" text-anchor="middle" class="mut mono-t" font-size="10">one request = a string of bytes · バイト列</text>
</svg>
