<svg class="dgm" viewBox="0 0 320 128" role="img" aria-label="A tester and an ECU exchange a UDS request and response">
  <!-- ===== Tester (left) ===== -->
  <rect x="12" y="33" width="80" height="62" rx="6" class="plate lnf"/>
  <rect x="12" y="33" width="80" height="62" rx="6" class="ln" fill="none" stroke-width="1.4"/>
  <rect x="20" y="41" width="64" height="15" rx="2.5" class="fl"/>
  <circle cx="28" cy="48.5" r="2.4" class="acc"/>
  <text x="56" y="52" text-anchor="middle" class="mut mono-t" font-size="8">TESTER</text>
  <text x="24" y="79" class="acc mono-t" font-size="12">&gt;</text>
  <text x="34" y="79" class="ink mono-t" font-size="12">10</text>
  <rect x="55" y="70" width="6" height="11" class="acc"/>
  <text x="52" y="112" text-anchor="middle" class="mut" font-size="10">Tester</text>

  <!-- ===== ECU (right) ===== -->
  <line x1="240" y1="30" x2="240" y2="36" class="ln" stroke-width="1.8"/>
  <line x1="264" y1="30" x2="264" y2="36" class="ln" stroke-width="1.8"/>
  <line x1="288" y1="30" x2="288" y2="36" class="ln" stroke-width="1.8"/>
  <line x1="240" y1="92" x2="240" y2="98" class="ln" stroke-width="1.8"/>
  <line x1="264" y1="92" x2="264" y2="98" class="ln" stroke-width="1.8"/>
  <line x1="288" y1="92" x2="288" y2="98" class="ln" stroke-width="1.8"/>
  <rect x="228" y="36" width="80" height="56" rx="6" class="plate"/>
  <rect x="228" y="36" width="80" height="56" rx="6" class="ln" fill="none" stroke-width="1.4"/>
  <text x="268" y="62" text-anchor="middle" class="ink" font-size="16" font-weight="700">ECU</text>
  <text x="268" y="79" text-anchor="middle" class="mut mono-t" font-size="8">ISO 14229</text>
  <text x="268" y="112" text-anchor="middle" class="mut" font-size="10">Vehicle</text>

  <!-- ===== request (accent, top) ===== -->
  <path d="M96 52 L222 52" class="acc-s" stroke-width="2.2" marker-end="url(#c_ar)"/>
  <text x="160" y="45" text-anchor="middle" class="acc mono-t" font-size="10.5">10 03</text>

  <!-- ===== response (green, bottom) ===== -->
  <path d="M224 78 L98 78" class="grn-s" stroke-width="2.2" marker-end="url(#c_ag)"/>
  <text x="160" y="92" text-anchor="middle" class="grn mono-t" font-size="10.5">50 03 …</text>

  <!-- ===== UDS badge ===== -->
  <rect x="139" y="55" width="42" height="20" rx="3.5" class="plate acc-s" stroke-width="1.4"/>
  <text x="160" y="69" text-anchor="middle" class="acc mono-t" font-size="11" font-weight="700">UDS</text>

  <defs>
    <marker id="c_ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" class="acc"/></marker>
    <marker id="c_ag" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" class="grn"/></marker>
  </defs>
</svg>
