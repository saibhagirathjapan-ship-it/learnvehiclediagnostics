<svg class="dgm" viewBox="0 0 720 200" role="img" aria-label="Check first, work second. Inside the server, a request is validated before any work. If it passes, the ECU does the job and returns a positive reply. If a check fails, the negative reply — 7F, SID, NRC — is born right there, inside the server, never on the wire.">
  <text x="360" y="22" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="1.2">CHECK FIRST, WORK SECOND · まず確認、それから作業</text>

  <!-- the wire (outside): carries bytes, decides nothing -->
  <text x="84" y="82" text-anchor="middle" class="mut mono-t" font-size="8.5">the wire</text>
  <path d="M 20 93 H 150 M 143 89 L 150 93 L 143 97" class="ln" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="110" text-anchor="middle" class="mut" font-size="8">bytes only — no decisions</text>

  <!-- inside the server -->
  <rect x="150" y="40" width="540" height="150" rx="10" class="plate ln" stroke-width="1.4"/>
  <text x="166" y="60" class="acc mono-t" font-size="9.5">INSIDE THE SERVER · サーバーの中</text>

  <rect x="168" y="76" width="76" height="34" rx="6" class="plate acc-s" stroke-width="1.5"/>
  <text x="206" y="97" text-anchor="middle" class="acc w7" font-size="10">request</text>

  <path d="M 244 93 H 290 M 283 89 L 290 93 L 283 97" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="290" y="70" width="118" height="46" rx="8" class="fl ln" stroke-width="1.4"/>
  <text x="349" y="90" text-anchor="middle" class="ink w7" font-size="11">CHECK</text>
  <text x="349" y="104" text-anchor="middle" class="mut" font-size="8">session · unlock · valid?</text>

  <!-- pass branch -->
  <text x="429" y="86" text-anchor="middle" class="grn mono-t" font-size="8">pass</text>
  <path d="M 408 93 H 450 M 443 89 L 450 93 L 443 97" class="grn-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="450" y="76" width="92" height="34" rx="6" class="fl grn-s" stroke-width="1.4"/>
  <text x="496" y="97" text-anchor="middle" class="ink" font-size="10">do the job</text>
  <path d="M 542 93 H 586 M 579 89 L 586 93 L 579 97" class="grn-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="586" y="76" width="100" height="34" rx="6" class="plate grn-s" stroke-width="1.5"/>
  <text x="636" y="91" text-anchor="middle" class="grn w7" font-size="10">✓ positive</text>
  <text x="636" y="103" text-anchor="middle" class="mut mono-t" font-size="8">SID + 0x40</text>

  <!-- fail branch: the "no" is born here -->
  <path d="M 349 116 V 167 H 430 M 423 163 L 430 167 L 423 171" class="red-s" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 349 132 v10 M 344 137 h10 M 345.5 133.5 l7 7 M 352.5 133.5 l-7 7" class="red-s" stroke-width="1.3" stroke-linecap="round"/>
  <text x="343" y="140" text-anchor="end" class="red mono-t" font-size="8.5">a “no” is born here</text>
  <rect x="430" y="150" width="250" height="34" rx="6" class="plate red-s" stroke-width="1.5"/>
  <text x="555" y="171" text-anchor="middle" class="red mono-t" font-size="11">7F + SID + NRC</text>
</svg>
