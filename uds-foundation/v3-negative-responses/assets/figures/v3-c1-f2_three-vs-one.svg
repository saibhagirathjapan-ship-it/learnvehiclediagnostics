<svg class="dgm" viewBox="0 0 572 220" role="img" aria-label="A positive reply 50 packs two facts (positive, and which service) into one byte via +40h; a negative reply 7F 10 22 keeps its three facts — no, which, why — in three separate bytes.">
<text x="286" y="26" text-anchor="middle" class="ink w7" font-size="15">A yes packs two facts into one byte — a no keeps three apart</text><text x="42" y="88" class="mut mono-t w7" font-size="11.5">a yes</text><g><rect x="176" y="58" width="58" height="50" rx="0" class="plate tick" stroke-width="2.4"/><text x="205" y="89.8" text-anchor="middle" class="ink mono-t" font-size="20">50<tspan font-size="13.6">h</tspan></text><circle cx="225" cy="67" r="6" class="plate tick" stroke-width="1.3"/><path d="M 222.3 67 l 1.7 1.9 L 228 64.4" class="tick" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><text x="260" y="80" class="ink mono-t w7" font-size="12">= yes + which</text><text x="260" y="99" class="mut" font-size="10.5">one byte · via +40h</text><path d="M 42 129 H 374" class="ln" stroke-width="1" opacity="0.45"/><text x="42" y="176" class="mut mono-t w7" font-size="11.5">a no</text><g><rect x="176" y="146" width="58" height="50" rx="0" class="plate cross" stroke-width="2.4"/><text x="205" y="177.8" text-anchor="middle" class="ink mono-t" font-size="20">7F<tspan font-size="13.6">h</tspan></text><circle cx="225" cy="155" r="6" class="plate cross" stroke-width="1.3"/><path d="M 222.6 152.6 l 4.8 4.8 M 227.4 152.6 l -4.8 4.8" class="cross" stroke-width="1.5" stroke-linecap="round"/></g><g><rect x="246" y="146" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="275" y="177.8" text-anchor="middle" class="ink mono-t" font-size="20">10<tspan font-size="13.6">h</tspan></text></g><g><rect x="316" y="146" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="345" y="177.8" text-anchor="middle" class="ink mono-t" font-size="20">22<tspan font-size="13.6">h</tspan></text></g><text x="400" y="168" class="ink mono-t w7" font-size="12">= <tspan class="red">no</tspan> + <tspan class="acc">which</tspan> + why</text><text x="400" y="187" class="mut" font-size="10.5">three bytes · one each</text>
</svg>