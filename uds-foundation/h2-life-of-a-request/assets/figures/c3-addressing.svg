  <rect x="30" y="40" width="118" height="40" rx="6" class="fl acc-s" stroke-width="1.5"/><text x="89" y="64" text-anchor="middle" class="ink w7" font-size="12">Tester</text>
  <path d="M 148 60 H 250 M 245 55 L 252 60 L 245 65" class="acc-s" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="201" y="52" text-anchor="middle" class="mut mono-t" font-size="9">to one ECU</text>
  <rect x="252" y="40" width="88" height="40" rx="6" class="fl ln" stroke-width="1.5"/><text x="296" y="64" text-anchor="middle" class="ink w7" font-size="12">ECU</text>

  <text x="380" y="20" class="acc mono-t" font-size="10.5" letter-spacing="1">FUNCTIONAL · 1:n</text>
  <line x1="380" y1="26" x2="700" y2="26" class="ln" stroke-width="1"/>
  <rect x="376" y="76" width="118" height="40" rx="6" class="fl acc-s" stroke-width="1.5"/><text x="435" y="100" text-anchor="middle" class="ink w7" font-size="12">Tester</text>
  <path d="M 494 96 C 528 96 540 60 566 60" class="acc-s" stroke-width="1.6" fill="none" opacity="0.6"/><path d="M 494 96 C 528 96 540 114 566 114" class="acc-s" stroke-width="1.6" fill="none" opacity="0.6"/><path d="M 494 96 C 528 96 540 168 566 168" class="acc-s" stroke-width="1.6" fill="none" opacity="0.6"/>
  <rect x="566" y="42" width="118" height="36" rx="6" class="fl ln" stroke-width="1.5"/><text x="625" y="64" text-anchor="middle" class="ink w7" font-size="12">ECU</text><rect x="566" y="96" width="118" height="36" rx="6" class="fl grn-s" stroke-width="1.5"/><text x="625" y="114" text-anchor="middle" class="ink w7" font-size="12">ECU · B ✓</text><text x="625" y="128" text-anchor="middle" class="grn" font-size="9.5">has the function</text><rect x="566" y="150" width="118" height="36" rx="6" class="fl ln" stroke-width="1.5"/><text x="625" y="172" text-anchor="middle" class="ink w7" font-size="12">ECU</text>
  <path d="M 684 114 H 702 V 200 H 435 V 118" class="grn-s" stroke-width="1.8" fill="none" marker-end="url(#a)"/>
  <text x="556" y="213" text-anchor="middle" class="grn mono-t" font-size="9">answer 1:1 · 応答は1対1</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" class="grn"/></marker></defs>
</svg>
