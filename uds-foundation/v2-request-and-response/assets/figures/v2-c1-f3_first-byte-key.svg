<svg class="dgm" viewBox="0 0 578 190" role="img" aria-label="The first byte decides the format: any value other than 7F is a normal message, 7F alone flags a negative response.">
<text x="310" y="26" text-anchor="middle" class="ink w7" font-size="15">Read the first byte first</text><rect x="40" y="78" width="92" height="54" class="acc-s" stroke-width="2.2" fill="none"/><text x="86" y="104" text-anchor="middle" class="acc mono-t w8" font-size="17">1st</text><text x="86" y="122" text-anchor="middle" class="mut" font-size="10">byte</text><path d="M 132 105 H 216 V 67 H 300 M 294 62 L 300 67 L 294 72" class="ln" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M 132 105 H 216 V 153 H 300 M 294 148 L 300 153 L 294 158" class="red-s" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="222" y="59" class="mut mono-t" font-size="10.5">≠ 7Fh</text><text x="222" y="173" class="red mono-t" font-size="10.5">= 7Fh</text><rect x="300" y="44" width="238" height="46" class="ln" stroke-width="1.8" fill="none"/><text x="314" y="64" class="ink mono-t w7" font-size="12">normal message</text><text x="314" y="81" class="mut" font-size="10.5">read as a service + its data</text><rect x="300" y="130" width="238" height="46" class="red-s" stroke-width="1.8" fill="none"/><text x="314" y="150" class="ink mono-t w7" font-size="12">negative response</text><text x="314" y="167" class="mut" font-size="10.5">a refusal → V3</text>
</svg>