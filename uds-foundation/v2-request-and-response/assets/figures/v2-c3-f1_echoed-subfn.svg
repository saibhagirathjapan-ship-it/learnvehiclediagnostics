le" class="mut mono-t" font-size="11">you send</text><g data-stage="3"><text x="306" y="132" text-anchor="middle" class="mut mono-t" font-size="11">you get</text></g><g data-stage="4"><text x="306" y="154" text-anchor="middle" class="acc mono-t" font-size="10.5">top bit → 0 (a flag → V4)</text></g>
