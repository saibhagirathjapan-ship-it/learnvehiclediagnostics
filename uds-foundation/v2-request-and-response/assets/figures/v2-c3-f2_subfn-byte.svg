<svg class="dgm" viewBox="0 0 504 156" role="img" aria-label="The sub-function byte splits into a top-bit flag and the lower seven value bits; on the echoed reply the flag is 0.">
<text x="252" y="30" text-anchor="middle" class="ink w7" font-size="14">One byte, two jobs</text><rect x="70" y="54" width="96" height="52" class="acc-s" stroke-width="2" fill="none"/><text x="118" y="76" text-anchor="middle" class="acc mono-t w7" font-size="12">bit 7</text><text x="118" y="94" text-anchor="middle" class="mut" font-size="10.5">a flag</text><rect x="166" y="54" width="236" height="52" class="ecu-s" stroke-width="2" fill="none"/><text x="284" y="76" text-anchor="middle" class="ecu mono-t w7" font-size="12">bits 6–0</text><text x="284" y="94" text-anchor="middle" class="mut" font-size="10.5">the value (here 03)</text><text x="252" y="132" text-anchor="middle" class="mut" font-size="11.5">On the echo the flag is 0; what it means when set is V4's story.</text>
</svg>