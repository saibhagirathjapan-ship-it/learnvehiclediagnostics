<svg class="dgm" viewBox="0 0 720 200" role="img" aria-label="The client-server exchange: the tester (client) sends a request to the ECU (server), which then answers with a response; the ECU never speaks first">
  <rect x="40" y="44" width="210" height="120" rx="9" class="fl acc-s" stroke-width="2"/>
  <g>
    <rect x="58" y="82" width="38" height="44" rx="5" class="plate ln" stroke-width="1.5"/>
    <rect x="63" y="86" width="28" height="19" rx="2" fill="#0d1013"/>
    <circle cx="68" cy="119" r="2.4" class="lnf"/><circle cx="77" cy="119" r="2.4" class="lnf"/><circle cx="86" cy="119" r="2.4" class="lnf"/>
  </g>
  <text x="110" y="99" class="acc w8" font-size="15">CLIENT</text>
  <text x="110" y="117" class="ink" font-size="12">Tester · テスター</text>
  <text x="145" y="182" text-anchor="middle" class="mut mono-t" font-size="9.5">asks first · 先に尋ねる</text>
  <rect x="470" y="44" width="210" height="120" rx="9" class="fl grn-s" stroke-width="2"/>
  <g><rect x="492" y="89" width="30" height="30" rx="2" class="fl ln" stroke-width="1.4"/><line x1="488" y1="96" x2="492" y2="96" class="ln" stroke-width="1.5"/><line x1="522" y1="96" x2="526" y2="96" class="ln" stroke-width="1.5"/><line x1="488" y1="104" x2="492" y2="104" class="ln" stroke-width="1.5"/><line x1="522" y1="104" x2="526" y2="104" class="ln" stroke-width="1.5"/><line x1="488" y1="112" x2="492" y2="112" class="ln" stroke-width="1.5"/><line x1="522" y1="112" x2="526" y2="112" class="ln" stroke-width="1.5"/><circle cx="497" cy="94" r="1.6" class="lnf"/></g>
  <text x="540" y="99" class="grn w8" font-size="15">SERVER</text>
  <text x="540" y="117" class="ink" font-size="12">ECU · 制御ユニット</text>
  <text x="575" y="182" text-anchor="middle" class="mut mono-t" font-size="9.5">answers only · 応答のみ</text>

  <!-- request channel: client → server -->
  <text x="360" y="80" text-anchor="middle" class="acc mono-t" font-size="11">request →</text>
  <path d="M 250 90 H 464 M 463 85 L 470 90 L 463 95" class="acc-s" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle r="3.6" class="acc">
    <animateMotion dur="2.4s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.45;1" keyPoints="0;1;1" path="M 250 90 L 470 90"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.44;0.5;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- response channel: server → client -->
  <text x="360" y="142" text-anchor="middle" class="grn mono-t" font-size="11">← response</text>
  <path d="M 470 126 H 256 M 257 121 L 250 126 L 257 131" class="grn-s" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle r="3.6" class="grn">
    <animateMotion dur="2.4s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.5;0.95;1" keyPoints="0;0;1;1" path="M 470 126 L 250 126"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.54;0.92;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
