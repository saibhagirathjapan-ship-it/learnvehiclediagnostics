<svg class="dgm" viewBox="0 0 720 214" role="img" aria-label="The ISO 14229 family as one container split into three job compartments: what to say (Part 1, the services), keep the session (Part 2), and how it travels (Parts 3 to 7, the transport bindings over CAN, FlexRay, IP/DoIP, K-Line and LIN)">
  <!-- family container -->
  <rect x="18" y="18" width="684" height="184" rx="10" class="plate ln" stroke-width="1.5"/>
  <text x="38" y="47" class="acc w8" font-size="16">ISO 14229</text>
  <text x="132" y="47" class="mut" font-size="12.5">· the UDS family / UDSの一族</text>
  <line x1="36" y1="58" x2="684" y2="58" class="ln" stroke-width="1"/>

  <rect x="36" y="72" width="205" height="118" rx="7" class="fl ln" stroke-width="1.3"/>
    <text x="50" y="93" class="acc mono-t" font-size="10.5">① · what to say / 何を言う</text>
    <text x="50" y="114" class="ink w7" font-size="13.5">-1 · Application layer</text>
    <text x="50" y="140" class="mut" font-size="11">the services</text>
      <text x="50" y="161" class="acc mono-t" font-size="13">$10 · $22 · $19</text>
      <text x="50" y="180" class="acc mono-t" font-size="13">$2E · $27 · $31 …</text>

  <rect x="257" y="72" width="205" height="118" rx="7" class="fl ln" stroke-width="1.3"/>
    <text x="271" y="93" class="acc mono-t" font-size="10.5">② · keep the session / 維持</text>
    <text x="271" y="114" class="ink w7" font-size="13.5">-2 · Session layer</text>
    <text x="271" y="140" class="mut" font-size="11">sessions &amp; timing</text>
      <text x="271" y="161" class="acc mono-t" font-size="13">P2 · P2* · S3</text>
      <text x="271" y="180" class="mut" font-size="11">one active at a time</text>

  <rect x="478" y="72" width="205" height="118" rx="7" class="fl ln" stroke-width="1.3"/>
    <text x="492" y="93" class="acc mono-t" font-size="10.5">③ · how it travels / 運ぶ</text>
    <text x="492" y="114" class="ink w7" font-size="13.5">-3…-7 · Transport</text>
    <text x="492" y="132" class="acc mono-t" font-size="11.5">-3</text><text x="520" y="132" class="ink" font-size="11.5">CAN</text><text x="492" y="146" class="acc mono-t" font-size="11.5">-4</text><text x="520" y="146" class="ink" font-size="11.5">FlexRay</text><text x="492" y="160" class="acc mono-t" font-size="11.5">-5</text><text x="520" y="160" class="ink" font-size="11.5">IP · DoIP</text><text x="492" y="174" class="acc mono-t" font-size="11.5">-6</text><text x="520" y="174" class="ink" font-size="11.5">K-Line</text><text x="492" y="188" class="acc mono-t" font-size="11.5">-7</text><text x="520" y="188" class="ink" font-size="11.5">LIN</text>
</svg>
