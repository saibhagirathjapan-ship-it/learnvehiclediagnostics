<svg class="dgm" viewBox="0 0 720 176" role="img" aria-label="Keeping a session alive. A non-default session runs an idle clock that fills toward a timeout. A periodic 3E TesterPresent message from the tester resets that clock, so the session stays open. If 3E stops, the clock reaches timeout and the ECU returns to the default session, locked.">
  <text x="360" y="22" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="1.2">KEEPING A SESSION ALIVE · セッションを保つ</text>

  <!-- tester -->
  <rect x="26" y="74" width="104" height="46" rx="8" class="plate ln" stroke-width="1.3"/>
  <text x="78" y="96" text-anchor="middle" class="ink w7" font-size="11.5">TESTER</text>
  <text x="78" y="110" text-anchor="middle" class="mut" font-size="9">テスター</text>

  <!-- $3E keep-alive arrow into the session (endpoints touch tester edge and plate edge) -->
  <text x="165" y="88" text-anchor="middle" class="acc mono-t" font-size="9.5">$3E</text>
  <path d="M 130 97 H 194 M 193 93 L 200 97 L 193 101" class="acc-s" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- session plate -->
  <rect x="202" y="50" width="330" height="82" rx="8" class="plate acc-s" stroke-width="1.6"/>
  <text x="367" y="70" text-anchor="middle" class="acc w7" font-size="11">NON-DEFAULT SESSION — open</text>
  <text x="367" y="85" text-anchor="middle" class="mut" font-size="9">held open only while fed $3E</text>

  <!-- idle clock: a track that fills toward the timeout edge, reset each time $3E arrives -->
  <text x="236" y="112" text-anchor="start" class="mut mono-t" font-size="8">idle clock</text>
  <rect x="236" y="114" width="262" height="12" rx="6" class="fl ln" stroke-width="1.1"/>
  <rect x="238" y="116" width="0" height="8" rx="4" class="acc">
    <animate attributeName="width" dur="3s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.78;0.80;1" values="2;250;2;2"/>
  </rect>
  <line x1="500" y1="108" x2="500" y2="132" class="red-s" stroke-width="2"/>
  <text x="500" y="146" text-anchor="middle" class="red mono-t" font-size="8">TIMEOUT</text>

  <!-- arrow out to default when $3E lapses (endpoints touch plate edge and default box edge) -->
  <text x="566" y="86" text-anchor="middle" class="mut" font-size="8.5">if $3E stops</text>
  <path d="M 532 98 H 598 M 597 94 L 604 98 L 597 102" class="ln" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- default (locked) -->
  <rect x="606" y="76" width="90" height="46" rx="8" class="plate ln" stroke-width="1.3"/>
  <path d="M 623 95 v-3 a4 4 0 0 1 8 0 v3" class="amb-s" stroke-width="1.5" fill="none"/>
  <rect x="620" y="95" width="14" height="11" rx="1.5" class="plate amb-s" stroke-width="1.3"/>
  <circle cx="627" cy="100.5" r="1.3" class="amb"/>
  <text x="662" y="95" text-anchor="middle" class="ink w7" font-size="10.5">DEFAULT</text>
  <text x="651" y="115" text-anchor="middle" class="mut" font-size="8.5">locked</text>
</svg>
