<svg class="dgm" viewBox="0 0 614 148" role="img" aria-label="A_PDU equals A_SDU plus A_PCI: the data handed down, plus the control byte, make one protocol data unit.">
<text x="315" y="34" text-anchor="middle" class="ink w7" font-size="15">Two ingredients make the unit</text><rect x="28" y="66" width="150" height="52" class="ln" stroke-width="2" fill="none"/><text x="103" y="90" text-anchor="middle" class="mono-t ink w7" font-size="14">A_SDU</text><text x="103" y="107" text-anchor="middle" class="mut" font-size="10.5">the data handed down</text><text x="196" y="98" text-anchor="middle" class="acc mono-t w8" font-size="20">+</text><rect x="214" y="66" width="122" height="52" class="acc-s" stroke-width="2" fill="none"/><text x="275" y="90" text-anchor="middle" class="mono-t ink w7" font-size="14">A_PCI</text><text x="275" y="107" text-anchor="middle" class="mut" font-size="10.5">the control byte</text><text x="354" y="98" text-anchor="middle" class="acc mono-t w8" font-size="20">=</text><rect x="372" y="66" width="214" height="52" class="acc-s" stroke-width="2" fill="none"/><text x="479" y="90" text-anchor="middle" class="mono-t ink w7" font-size="14">A_PDU</text><text x="479" y="107" text-anchor="middle" class="mut" font-size="10.5">A_PCI + parameters + length</text><rect x="372" y="66" width="214" height="4" class="acc"/>
</svg>