<svg class="dgm" viewBox="0 0 700 246" role="img" aria-label="A reply built up as a PDU: an address label, a control header A_PCI whose first byte is the key, the service parameters, and a Length — together one A_PDU.">
<text x="350" y="34" text-anchor="middle" class="ink w7" font-size="15">A reply is one wrapped unit</text><g data-stage="1"><rect x="210" y="52" width="280" height="26" class="tester-s" stroke-width="1.5" fill="none"/><text x="350" y="69" text-anchor="middle" class="mut mono-t" font-size="10.5">Mtype · SA · TA — who ↔ who (from V1)</text></g><g data-stage="2"><text x="175" y="96" text-anchor="middle" class="acc mono-t w7" font-size="11">A_PCI</text></g><g><rect x="146" y="104" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="175" y="135.8" text-anchor="middle" class="ink mono-t" font-size="20">50</text></g><g data-stage="2"><text x="175" y="172" text-anchor="middle" class="acc" font-size="10.5">first byte = the key</text></g><g data-stage="3"><text x="385" y="96" text-anchor="middle" class="mut mono-t w7" font-size="11">parameters</text></g><g><rect x="216" y="104" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="245" y="135.8" text-anchor="middle" class="ink mono-t" font-size="20">03</text></g><g><rect x="286" y="104" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="315" y="135.8" text-anchor="middle" class="ink mono-t" font-size="20">00</text></g><g><rect x="356" y="104" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="385" y="135.8" text-anchor="middle" class="ink mono-t" font-size="20">32</text></g><g><rect x="426" y="104" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="455" y="135.8" text-anchor="middle" class="ink mono-t" font-size="20">01</text></g><g><rect x="496" y="104" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="525" y="135.8" text-anchor="middle" class="ink mono-t" font-size="20">F4</text></g><g data-stage="4"><path d="M 146 180 V 188 H 554 V 180" class="ln" stroke-width="1.5" fill="none"/><text x="350" y="206" text-anchor="middle" class="ink mono-t" font-size="12">Length = 6 bytes</text><text x="350" y="226" text-anchor="middle" class="acc w7" font-size="13">= one A_PDU (protocol data unit)</text></g>
</svg>