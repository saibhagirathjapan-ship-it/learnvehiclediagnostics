<svg class="dgm" viewBox="0 0 720 268" role="img" aria-label="A sequence diagram of one exchange. Time runs downward. Step 1 request leaves the tester and step 2 indication arrives at the ECU — the same message at its two ends. The ECU serves it. Step 3 response leaves the ECU and step 4 confirmation arrives at the tester.">
  <defs>
    <radialGradient id="glowC1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--ok)" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="var(--ok)" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="var(--ok)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- time axis -->
  <text x="44" y="92" text-anchor="middle" class="mut mono-t" font-size="9.5">time</text>
  <path d="M 44 100 V 232 M 39 227 L 44 234 L 49 227" class="ln" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- lifeline heads -->
  <rect x="110" y="20" width="150" height="50" rx="8" class="fl acc-s" stroke-width="2"/>
  <text x="185" y="44" text-anchor="middle" class="acc w8" font-size="14">TESTER</text>
  <text x="185" y="60" text-anchor="middle" class="ink" font-size="10.5">テスター</text>
  <rect x="460" y="20" width="150" height="50" rx="8" class="fl grn-s" stroke-width="2"/>
  <text x="535" y="44" text-anchor="middle" class="grn w8" font-size="14">ECU</text>
  <text x="535" y="60" text-anchor="middle" class="ink" font-size="10.5">制御ユニット</text>

  <!-- lifelines -->
  <path d="M 185 70 V 248" class="ln" stroke-width="1.4" stroke-dasharray="3 4"/>
  <path d="M 535 70 V 248" class="ln" stroke-width="1.4" stroke-dasharray="3 4"/>

  <!-- ECU serving glow (between indication and response) -->
  <circle cx="535" cy="155" r="34" fill="url(#glowC1)">
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.44;0.52;0.66;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <text x="560" y="158" class="mut mono-t" font-size="9">serves · 処理</text>

  <!-- request message: tester -> ECU -->
  <text x="196" y="108" class="acc mono-t" font-size="10.5">① request</text>
  <text x="524" y="108" text-anchor="end" class="acc mono-t" font-size="10.5">indication ②</text>
  <path d="M 185 118 H 529 M 528 113 L 535 118 L 528 123" class="acc-s" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle r="3.6" class="acc">
    <animateMotion dur="3.2s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.42;1" keyPoints="0;1;1" path="M 185 118 L 535 118"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.41;0.47;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- response message: ECU -> tester -->
  <text x="196" y="184" class="grn mono-t" font-size="10.5">④ confirmation</text>
  <text x="524" y="184" text-anchor="end" class="grn mono-t" font-size="10.5">response ③</text>
  <path d="M 535 192 H 191 M 192 187 L 185 192 L 192 197" class="grn-s" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle r="3.6" class="grn">
    <animateMotion dur="3.2s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.6;0.98;1" keyPoints="0;0;1;1" path="M 535 192 L 185 192"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.6;0.64;0.95;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- pairing note -->
  <text x="360" y="238" text-anchor="middle" class="mut" font-size="10">Steps 1 &amp; 2 are one message; steps 3 &amp; 4 are the other.</text>
</svg>
