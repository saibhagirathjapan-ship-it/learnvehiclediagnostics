<svg class="dgm" viewBox="0 0 390 150" role="img" aria-label="A negative response builds up one byte at a time: 7F the no-marker, then 10 the echoed service identifier saying which request, then 22 the negative response code saying why.">
<g data-stage="1" data-until="1"><text x="195" y="22" text-anchor="middle" class="ink w7" font-size="15">A refusal must carry three things</text></g><g data-stage="2" data-until="2"><text x="195" y="22" text-anchor="middle" class="ink w7" font-size="15">7Fh — the 'no' marker</text></g><g data-stage="3" data-until="3"><text x="195" y="22" text-anchor="middle" class="ink w7" font-size="15">byte 2 — which (the echoed SID)</text></g><g data-stage="4" data-until="4"><text x="195" y="22" text-anchor="middle" class="ink w7" font-size="15">no · which · why — three bytes, one each</text></g><g data-stage="1" data-until="1"><text x="195" y="85" text-anchor="middle" class="mut mono-t" font-size="15">no  ·  which  ·  why</text></g><g data-stage="2" data-until="2"><rect x="90" y="48" width="70" height="62" class="acc" opacity="0.12"/></g><g data-stage="3" data-until="3"><rect x="160" y="48" width="70" height="62" class="acc" opacity="0.12"/></g><g data-stage="4" data-until="4"><rect x="230" y="48" width="70" height="62" class="acc" opacity="0.12"/></g><g data-stage="2"><rect x="96" y="54" width="58" height="50" rx="0" class="plate cross" stroke-width="2.4"/><text x="125" y="85.8" text-anchor="middle" class="ink mono-t" font-size="20">7F<tspan font-size="13.6">h</tspan></text><circle cx="145" cy="63" r="6" class="plate cross" stroke-width="1.3"/><path d="M 142.6 60.6 l 4.8 4.8 M 147.4 60.6 l -4.8 4.8" class="cross" stroke-width="1.5" stroke-linecap="round"/></g><g data-stage="3"><rect x="166" y="54" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="195" y="85.8" text-anchor="middle" class="ink mono-t" font-size="20">10<tspan font-size="13.6">h</tspan></text></g><g data-stage="4"><rect x="236" y="54" width="58" height="50" rx="0" class="plate ln" stroke-width="2.4"/><text x="265" y="85.8" text-anchor="middle" class="ink mono-t" font-size="20">22<tspan font-size="13.6">h</tspan></text></g><g data-stage="2"><text x="125" y="122" text-anchor="middle" class="mut mono-t" font-size="12">no</text><text x="125" y="138" text-anchor="middle" class="red mono-t" font-size="10.5">the marker</text></g><g data-stage="3"><text x="195" y="122" text-anchor="middle" class="mut mono-t" font-size="12">which</text><text x="195" y="138" text-anchor="middle" class="acc mono-t" font-size="10.5">echoed SID</text></g><g data-stage="4"><text x="265" y="122" text-anchor="middle" class="mut mono-t" font-size="12">why</text><text x="265" y="138" text-anchor="middle" class="ink mono-t" font-size="10.5">NRC</text></g>
</svg>