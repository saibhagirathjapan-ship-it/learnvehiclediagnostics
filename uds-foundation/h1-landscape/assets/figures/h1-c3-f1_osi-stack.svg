<svg class="dgm" viewBox="0 0 720 210" role="img" aria-label="A three-layer stack: UDS (meaning) on top, transport in the middle, the physical bus at the bottom; the bottom wire can be swapped (CAN, Ethernet, K-Line) while the UDS on top is unchanged">
  <rect x="20" y="18" width="588" height="56" rx="8" class="fl acc-s" stroke-width="1.8"/>
  <text x="36" y="42" class="acc w8" font-size="15">UDS · ISO 14229</text>
  <text x="36" y="62" class="ink" font-size="11.5">the <tspan class="w7">meaning</tspan> of a message — "switch session" · "reset the ECU"</text>
  <rect x="626" y="18" width="74" height="56" rx="6" class="plate acc-s" stroke-width="1.3"/><text x="663" y="50" text-anchor="middle" class="mut mono-t" font-size="10">layer 7</text>

  <rect x="20" y="82" width="588" height="50" rx="8" class="fl ln" stroke-width="1.8"/>
  <text x="36" y="103" class="ink w7" font-size="14">Transport — carries it</text>
  <text x="36" y="122" class="mut" font-size="11">splits a long message into frames &amp; reassembles · ISO 15765-2 (CAN) · 13400-2 (DoIP)</text>
  <rect x="626" y="82" width="74" height="50" rx="6" class="plate ln" stroke-width="1.3"/><text x="663" y="111" text-anchor="middle" class="mut mono-t" font-size="10">4–3</text>

  <rect x="20" y="140" width="588" height="58" rx="8" class="fl ln" stroke-width="1.8"/>
  <text x="36" y="162" class="ink w7" font-size="14">Physical bus — the wires</text>
  <rect x="150" y="168" width="84" height="22" rx="4" class="plate ln" stroke-width="1.2"/><text x="192" y="183" text-anchor="middle" class="ink mono-t" font-size="11">CAN</text><rect x="242" y="168" width="84" height="22" rx="4" class="plate ln" stroke-width="1.2"/><text x="284" y="183" text-anchor="middle" class="ink mono-t" font-size="11">Ethernet</text><rect x="334" y="168" width="84" height="22" rx="4" class="plate ln" stroke-width="1.2"/><text x="376" y="183" text-anchor="middle" class="ink mono-t" font-size="11">K-Line</text>
  <text x="430" y="183" class="mut mono-t" font-size="10.5">← pick any one</text>
  <rect x="626" y="140" width="74" height="58" rx="6" class="plate ln" stroke-width="1.3"/><text x="663" y="173" text-anchor="middle" class="mut mono-t" font-size="10">2–1</text>
</svg>
