<svg class="dgm" viewBox="0 0 720 240" role="img" aria-label="A sealed ECU offers a menu of named services: open a session, read a value, read stored faults, control a signal, run a routine. In H2 we followed just one of them — the open-a-session service.">
  <text x="360" y="22" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="1.2">ONE REQUEST · A WHOLE MENU BEHIND IT · メニューまるごと</text>

  <!-- ECU: a sealed, bolted computer -->
  <rect x="44" y="72" width="150" height="100" rx="10" class="plate ln" stroke-width="1.4"/>
  <circle cx="58" cy="86" r="2.4" class="lnf"/><circle cx="180" cy="86" r="2.4" class="lnf"/>
  <circle cx="58" cy="158" r="2.4" class="lnf"/><circle cx="180" cy="158" r="2.4" class="lnf"/>
  <rect x="70" y="100" width="98" height="20" rx="3" class="fl ln" stroke-width="1"/>
  <text x="119" y="114" text-anchor="middle" class="mut mono-t" font-size="8.5">▤ ▤ ▤</text>
  <text x="119" y="140" text-anchor="middle" class="ink w7" font-size="13">ECU</text>
  <text x="119" y="156" text-anchor="middle" class="mut" font-size="8.5">sealed · bolted in</text>

  <!-- offers arrow: ECU right edge -> menu left edge -->
  <text x="247" y="112" text-anchor="middle" class="acc mono-t" font-size="9">offers ▸</text>
  <path d="M 194 122 H 300 M 293 118 L 300 122 L 293 126" class="acc-s" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- menu panel -->
  <rect x="300" y="34" width="384" height="182" rx="10" class="plate ln" stroke-width="1.4"/>
  <text x="492" y="55" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="0.6">WHAT THE ECU OFFERS · サービス一覧</text>
  <line x1="314" y1="64" x2="670" y2="64" class="ln" stroke-width="1"/>

  <!-- highlighted row: $10 (the one H2 traced) -->
  <rect x="308" y="72" width="368" height="26" rx="5" class="plate acc-s" stroke-width="1.6"/>
  <rect x="314" y="74" width="34" height="22" rx="3" class="plate acc-s" stroke-width="1.3"/><text x="331" y="89" text-anchor="middle" class="acc mono-t" font-size="11.5">10</text>
  <text x="358" y="89" class="acc w7" font-size="11.5">open a session</text>
  <text x="670" y="89" text-anchor="end" class="acc mono-t" font-size="8.5">◂ H2 traced this one</text>

  <!-- other rows -->
  <rect x="314" y="106" width="34" height="20" rx="3" class="plate ln" stroke-width="1.1"/><text x="331" y="120" text-anchor="middle" class="ink mono-t" font-size="11">22</text>
  <text x="358" y="120" class="ink" font-size="11">read a value</text>
  <rect x="314" y="134" width="34" height="20" rx="3" class="plate ln" stroke-width="1.1"/><text x="331" y="148" text-anchor="middle" class="ink mono-t" font-size="11">19</text>
  <text x="358" y="148" class="ink" font-size="11">read stored faults</text>
  <rect x="314" y="162" width="34" height="20" rx="3" class="plate ln" stroke-width="1.1"/><text x="331" y="176" text-anchor="middle" class="ink mono-t" font-size="11">2F</text>
  <text x="358" y="176" class="ink" font-size="11">control a signal</text>
  <rect x="314" y="190" width="34" height="20" rx="3" class="plate ln" stroke-width="1.1"/><text x="331" y="204" text-anchor="middle" class="ink mono-t" font-size="11">31</text>
  <text x="358" y="204" class="ink" font-size="11">run a routine</text>
  <text x="670" y="204" text-anchor="end" class="mut mono-t" font-size="8.5">… and more</text>
</svg>
