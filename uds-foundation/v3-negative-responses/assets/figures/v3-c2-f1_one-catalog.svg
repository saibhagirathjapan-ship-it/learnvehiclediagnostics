<svg class="dgm" viewBox="0 0 564 172" role="img" aria-label="The NRC catalog as one 00h to FFh number line split into three bands (00h internal, 01h to 7Fh communication, 80h to FFh specific conditions), with example codes 11h 22h 78h and 92h placed on the line; 11h, 22h and 78h are marked as generally supported by every service.">
