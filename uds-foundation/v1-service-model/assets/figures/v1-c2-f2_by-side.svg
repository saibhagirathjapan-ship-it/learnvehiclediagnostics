<svg class="dgm" viewBox="0 0 720 250" role="img" aria-label="All six steps sorted by side. The tester's side owns request (sends), request-confirmation (a local sent signal), and confirmation (receives). The ECU's side owns indication (receives), response (sends), and response-confirmation (a local sent signal). Each step has one home.">
  <text x="195" y="42" text-anchor="middle" class="acc w8" font-size="13">TESTER'S SIDE</text>
  <text x="195" y="58" text-anchor="middle" class="mut" font-size="10">テスター側</text>
  <text x="525" y="42" text-anchor="middle" class="grn w8" font-size="13">ECU'S SIDE</text>
  <text x="525" y="58" text-anchor="middle" class="mut" font-size="10">ECU側</text>
  <path d="M 360 74 V 232" class="ln" stroke-width="1.3" stroke-dasharray="3 4"/>

  <!-- tester side -->
  <rect x="70" y="80" width="250" height="42" rx="6" class="fl acc-s" stroke-width="1.7"/>
  <text x="88" y="105" class="acc mono-t w7" font-size="12.5">request</text>
  <text x="305" y="105" text-anchor="end" class="mut mono-t" font-size="9.5">sends</text>
  <rect x="70" y="132" width="250" height="42" rx="6" class="fl acc-s" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="88" y="157" class="acc mono-t w7" font-size="12.5">request-confirmation</text>
  <text x="305" y="157" text-anchor="end" class="mut mono-t" font-size="9.5">local ✓
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </text>
  <rect x="70" y="184" width="250" height="42" rx="6" class="fl acc-s" stroke-width="1.7"/>
  <text x="88" y="209" class="acc mono-t w7" font-size="12.5">confirmation</text>
  <text x="305" y="209" text-anchor="end" class="mut mono-t" font-size="9.5">receives</text>

  <!-- ECU side -->
  <rect x="400" y="80" width="250" height="42" rx="6" class="fl grn-s" stroke-width="1.7"/>
  <text x="418" y="105" class="grn mono-t w7" font-size="12.5">indication</text>
  <text x="635" y="105" text-anchor="end" class="mut mono-t" font-size="9.5">receives</text>
  <rect x="400" y="132" width="250" height="42" rx="6" class="fl grn-s" stroke-width="1.7"/>
  <text x="418" y="157" class="grn mono-t w7" font-size="12.5">response</text>
  <text x="635" y="157" text-anchor="end" class="mut mono-t" font-size="9.5">sends</text>
  <rect x="400" y="184" width="250" height="42" rx="6" class="fl grn-s" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="418" y="209" class="grn mono-t w7" font-size="12.5">response-confirmation</text>
  <text x="635" y="209" text-anchor="end" class="mut mono-t" font-size="9.5">local ✓
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </text>
</svg>
