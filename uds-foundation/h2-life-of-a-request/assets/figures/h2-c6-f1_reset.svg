<svg class="dgm" viewBox="0 0 720 180" role="img" aria-label="ECUReset returns the ECU to power-up state. On the left, a non-default session with an open padlock, unlocked. The tester sends 11 01 and the ECU answers 51 01, then reboots. On the right, the ECU is back in the default session with a closed padlock, security re-locked.">
  <text x="360" y="22" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="1.2">$11 ECURESET — REBOOT TO DEFAULT · $11 ECUリセット</text>

  <!-- reboot arc from the unlocked state over to the locked state (endpoints touch both box tops) -->
  <path d="M 114 70 Q 360 24 606 70" class="acc-s" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <path d="M 606 70 l -6 -4 l 1 7" class="acc-s" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="40" text-anchor="middle" class="acc mono-t" font-size="9">reboot — as if freshly powered on</text>

  <!-- left state: non-default, unlocked (open padlock) -->
  <rect x="26" y="72" width="176" height="76" rx="8" class="plate acc-s" stroke-width="1.5"/>
  <path d="M 108 100 v-4 a5 5 0 0 1 10 0" class="acc-s" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <rect x="106" y="100" width="17" height="13" rx="1.6" class="plate acc-s" stroke-width="1.4"/>
  <circle cx="114.5" cy="106.5" r="1.6" class="acc"/>
  <text x="114" y="130" text-anchor="middle" class="acc w7" font-size="11">NON-DEFAULT</text>
  <text x="114" y="143" text-anchor="middle" class="mut" font-size="9">session · unlocked</text>

  <!-- the trace: 11 01 request → 51 01 response -->
  <rect x="284" y="82" width="27" height="20" rx="2.5" class="plate acc-s" stroke-width="1.2"/><text x="297.5" y="96" text-anchor="middle" class="acc mono-t" font-size="12">11</text>
  <rect x="313" y="82" width="27" height="20" rx="2.5" class="plate acc-s" stroke-width="1.2"/><text x="326.5" y="96" text-anchor="middle" class="acc mono-t" font-size="12">01</text>
  <path d="M 346 92 H 378 M 377 88 L 384 92 L 377 96" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="388" y="82" width="27" height="20" rx="2.5" class="plate grn-s" stroke-width="1.2"/><text x="401.5" y="96" text-anchor="middle" class="grn mono-t" font-size="12">51</text>
  <rect x="417" y="82" width="27" height="20" rx="2.5" class="plate grn-s" stroke-width="1.2"/><text x="430.5" y="96" text-anchor="middle" class="grn mono-t" font-size="12">01</text>
  <text x="364" y="120" text-anchor="middle" class="mut" font-size="9">request → positive reply, then reset</text>

  <!-- right state: default, re-locked (closed amber padlock) -->
  <rect x="518" y="72" width="176" height="76" rx="8" class="plate ln" stroke-width="1.3"/>
  <path d="M 600 100 v-4 a5 5 0 0 1 10 0 v4" class="amb-s" stroke-width="1.6" fill="none"/>
  <rect x="596" y="100" width="18" height="13" rx="1.6" class="plate amb-s" stroke-width="1.4"/>
  <circle cx="605" cy="106.5" r="1.6" class="amb"/>
  <text x="605" y="130" text-anchor="middle" class="ink w7" font-size="11">DEFAULT</text>
  <text x="605" y="143" text-anchor="middle" class="mut" font-size="9">security re-locked</text>
</svg>
