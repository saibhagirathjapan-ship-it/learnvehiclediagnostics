<svg class="dgm" viewBox="0 0 720 222" role="img" aria-label="One request, one answer: the tester sends the request bytes 10 03 to the ECU; the ECU serves the request; a single response 50 03 travels back. Three beats — the tester asks, the ECU serves it, one answer returns.">
  <defs>
    <radialGradient id="serveglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.34"/>
      <stop offset="60%" stop-color="var(--accent)" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ECU "serving" glow — fades in while the request is being served (between arrival and reply) -->
  <circle cx="601" cy="100" r="54" fill="url(#serveglow)">
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.44;0.52;0.62;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== TESTER (left) — handheld scan tool ===== -->
  <rect x="24" y="50" width="190" height="100" rx="9" class="plate acc-s" stroke-width="1.6"/>
  <rect x="99" y="64" width="40" height="42" rx="5" class="plate ln" stroke-width="1.5"/>
  <rect x="105" y="69" width="28" height="17" rx="2" fill="#0d1013"/>
  <text x="119" y="81.5" text-anchor="middle" class="mono-t" font-size="8" fill="#dea945">SCAN</text>
  <circle cx="110" cy="99" r="2.4" class="lnf"/><circle cx="119" cy="99" r="2.4" class="lnf"/><circle cx="128" cy="99" r="2.4" class="lnf"/>
  <text x="119" y="125" text-anchor="middle" class="ink w7" font-size="12.5">TESTER</text>
  <text x="119" y="140" text-anchor="middle" class="mut" font-size="10.5">テスター</text>

  <!-- ===== ECU (right) — chip ===== -->
  <rect x="506" y="50" width="190" height="100" rx="9" class="plate grn-s" stroke-width="1.6"/>
  <rect x="585" y="68" width="32" height="32" rx="3" class="fl ln" stroke-width="1.5"/>
  <rect x="591" y="74" width="20" height="20" rx="1.5" class="plate ln" stroke-width="1.1"/>
  <circle cx="595" cy="78" r="1.4" class="lnf"/>
  <line x1="581" y1="75" x2="585" y2="75" class="ln" stroke-width="1.4"/><line x1="581" y1="84" x2="585" y2="84" class="ln" stroke-width="1.4"/><line x1="581" y1="93" x2="585" y2="93" class="ln" stroke-width="1.4"/>
  <line x1="617" y1="75" x2="621" y2="75" class="ln" stroke-width="1.4"/><line x1="617" y1="84" x2="621" y2="84" class="ln" stroke-width="1.4"/><line x1="617" y1="93" x2="621" y2="93" class="ln" stroke-width="1.4"/>
  <text x="601" y="125" text-anchor="middle" class="ink w7" font-size="12.5">ECU</text>
  <text x="601" y="140" text-anchor="middle" class="mut" font-size="10.5">制御ユニット</text>

  <!-- ===== request wire + a travelling byte packet (10 03) ===== -->
  <text x="360" y="47" text-anchor="middle" class="acc mono-t" font-size="9" letter-spacing="0.5">request →</text>
  <path d="M 214 94 H 500 M 499 89 L 506 94 L 499 99" class="acc-s" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <rect x="222" y="85.5" width="26" height="17" rx="2.5" class="plate acc-s" stroke-width="1.2"/><text x="235" y="98" text-anchor="middle" class="acc mono-t" font-size="11">10</text>
    <rect x="250" y="85.5" width="26" height="17" rx="2.5" class="plate acc-s" stroke-width="1.2"/><text x="263" y="98" text-anchor="middle" class="acc mono-t" font-size="11">03</text>
    <circle cx="288" cy="94" r="3.2" class="acc"/>
    <animateTransform attributeName="transform" type="translate" dur="2.6s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.42;1" values="0 0;214 0;214 0"/>
    <animate attributeName="opacity" dur="2.6s" repeatCount="indefinite" keyTimes="0;0.03;0.37;0.44;1" values="0;1;1;0;0"/>
  </g>

  <!-- ===== response wire + a travelling byte packet (50 03 …) ===== -->
  <path d="M 506 120 H 220 M 221 115 L 214 120 L 221 125" class="grn-s" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <circle cx="432" cy="120" r="3.2" class="grn"/>
    <rect x="440" y="111.5" width="26" height="17" rx="2.5" class="plate grn-s" stroke-width="1.2"/><text x="453" y="124" text-anchor="middle" class="grn mono-t" font-size="11">50</text>
    <rect x="468" y="111.5" width="26" height="17" rx="2.5" class="plate grn-s" stroke-width="1.2"/><text x="481" y="124" text-anchor="middle" class="grn mono-t" font-size="11">03</text>
    <rect x="496" y="111.5" width="26" height="17" rx="2.5" class="plate grn-s" stroke-width="1.2"/><text x="509" y="124" text-anchor="middle" class="grn mono-t" font-size="11">…</text>
    <animateTransform attributeName="transform" type="translate" dur="2.6s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.6;1" values="0 0;0 0;-232 0"/>
    <animate attributeName="opacity" dur="2.6s" repeatCount="indefinite" keyTimes="0;0.6;0.65;0.95;1" values="0;0;1;1;0"/>
  </g>
  <text x="360" y="168" text-anchor="middle" class="grn mono-t" font-size="9" letter-spacing="0.5">← response</text>

  <!-- ===== the three beats ===== -->
  <text x="119" y="197" text-anchor="middle" class="ink w7" font-size="11.5">① The tester asks</text>
  <text x="119" y="212" text-anchor="middle" class="mut" font-size="10">テスターが尋ねる</text>
  <text x="360" y="197" text-anchor="middle" class="ink w7" font-size="11.5">② The ECU serves it</text>
  <text x="360" y="212" text-anchor="middle" class="mut" font-size="10">ECUが処理する</text>
  <text x="601" y="197" text-anchor="middle" class="ink w7" font-size="11.5">③ One answer returns</text>
  <text x="601" y="212" text-anchor="middle" class="mut" font-size="10">答えが1つ返る</text>
</svg>
