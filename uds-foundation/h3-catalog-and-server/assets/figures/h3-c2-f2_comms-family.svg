<svg class="dgm" viewBox="0 0 720 196" role="img" aria-label="The first family, communication management. It holds the three services you met in H2 — 10 open a session, 11 reset, 3E keep alive — each with its own page. The same family also holds the access-control services 27, 28, 29 and 85, which pauses fault logging.">
  <rect x="40" y="34" width="640" height="152" rx="10" class="plate ln" stroke-width="1.4"/>
  <text x="58" y="58" class="acc mono-t" font-size="10" letter-spacing="0.6">FAMILY #1 · COMMUNICATION MANAGEMENT</text>
  <text x="662" y="58" text-anchor="end" class="mut" font-size="9">steer the conversation</text>
  <line x1="48" y1="66" x2="672" y2="66" class="ln" stroke-width="1"/>
  <text x="58" y="83" class="mut" font-size="8.5">The three you met in H2 — each has its own page:</text>

  <!-- the three known services (accent) -->
  <rect x="58" y="90" width="193" height="44" rx="7" class="plate acc-s" stroke-width="1.5"/>
  <rect x="70" y="99" width="34" height="24" rx="3" class="plate acc-s" stroke-width="1.3"/><text x="87" y="115" text-anchor="middle" class="acc mono-t" font-size="12">10</text>
  <text x="114" y="108" class="acc w7" font-size="10.5">open a session</text>
  <text x="114" y="124" class="acc mono-t" font-size="8.5">→ V7a</text>

  <rect x="263" y="90" width="193" height="44" rx="7" class="plate acc-s" stroke-width="1.5"/>
  <rect x="275" y="99" width="34" height="24" rx="3" class="plate acc-s" stroke-width="1.3"/><text x="292" y="115" text-anchor="middle" class="acc mono-t" font-size="12">11</text>
  <text x="319" y="108" class="acc w7" font-size="10.5">reset the ECU</text>
  <text x="319" y="124" class="acc mono-t" font-size="8.5">→ V7b</text>

  <rect x="468" y="90" width="193" height="44" rx="7" class="plate acc-s" stroke-width="1.5"/>
  <rect x="480" y="99" width="34" height="24" rx="3" class="plate acc-s" stroke-width="1.3"/><text x="497" y="115" text-anchor="middle" class="acc mono-t" font-size="12">3E</text>
  <text x="524" y="108" class="acc w7" font-size="10.5">keep it alive</text>
  <text x="524" y="124" class="acc mono-t" font-size="8.5">→ V7c</text>

  <!-- also in this family (muted) -->
  <text x="58" y="150" class="mut" font-size="8">Also in this family:</text>
  <rect x="58" y="154" width="300" height="26" rx="6" class="plate ln" stroke-width="1.1"/>
  <text x="70" y="171" class="ink" font-size="9.5"><tspan class="mono-t">27 · 28 · 29</tspan> — access control</text>
  <text x="346" y="171" text-anchor="end" class="mut mono-t" font-size="8.5">→ M4</text>
  <rect x="372" y="154" width="289" height="26" rx="6" class="plate ln" stroke-width="1.1"/>
  <text x="384" y="171" class="ink" font-size="9.5"><tspan class="mono-t">85</tspan> — pause fault logging</text>
  <text x="649" y="171" text-anchor="end" class="mut mono-t" font-size="8.5">→ M3</text>
</svg>
