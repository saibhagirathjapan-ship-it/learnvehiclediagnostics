<svg class="dgm" viewBox="0 0 720 192" role="img" aria-label="The gate matches the risk. Reading a value with 22 is harmless and open anytime, no gate. Reprogramming with 34 is risky and must pass two gates in a row — a non-default session and a security unlock with 27 — so it only happens on purpose.">
  <text x="360" y="22" text-anchor="middle" class="acc mono-t" font-size="9.5" letter-spacing="1.2">THE GATE MATCHES THE RISK · 危険度に見合う門</text>

  <!-- row A: harmless, open -->
  <rect x="40" y="48" width="150" height="36" rx="6" class="plate grn-s" stroke-width="1.4"/>
  <text x="115" y="65" text-anchor="middle" class="grn w7" font-size="10.5">read a value</text>
  <text x="115" y="78" text-anchor="middle" class="mut mono-t" font-size="9">$22</text>
  <text x="373" y="59" text-anchor="middle" class="mut mono-t" font-size="8.5">harmless — no gate</text>
  <path d="M 190 66 H 558 M 551 62 L 558 66 L 551 70" class="grn-s" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="558" y="48" width="132" height="36" rx="6" class="plate grn-s" stroke-width="1.4"/>
  <text x="624" y="70" text-anchor="middle" class="grn w7" font-size="11">✓ anytime</text>

  <!-- row B: risky, two gates -->
  <rect x="40" y="132" width="150" height="36" rx="6" class="plate ln" stroke-width="1.3"/>
  <text x="115" y="149" text-anchor="middle" class="ink w7" font-size="10.5">reprogram</text>
  <text x="115" y="162" text-anchor="middle" class="mut mono-t" font-size="9">$34</text>

  <path d="M 190 150 H 250" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <rect x="250" y="136" width="110" height="28" rx="6" class="fl acc-s" stroke-width="1.4"/>
  <text x="305" y="153" text-anchor="middle" class="acc mono-t" font-size="8.5">non-default session</text>

  <path d="M 360 150 H 400" class="ln" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <rect x="400" y="136" width="100" height="28" rx="6" class="fl amb-s" stroke-width="1.4"/>
  <path d="M 411 149 v-2 a4 4 0 0 1 8 0 v2" class="amb-s" stroke-width="1.4" fill="none"/>
  <rect x="408" y="149" width="14" height="10" rx="1.4" class="plate amb-s" stroke-width="1.2"/>
  <text x="430" y="156" text-anchor="start" class="amb mono-t" font-size="8.5">unlock $27</text>

  <path d="M 500 150 H 558 M 551 146 L 558 150 L 551 154" class="acc-s" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="558" y="132" width="132" height="36" rx="6" class="plate acc-s" stroke-width="1.5"/>
  <text x="624" y="154" text-anchor="middle" class="acc w7" font-size="11">✓ on purpose</text>

  <text x="373" y="184" text-anchor="middle" class="mut mono-t" font-size="8.5">risky — needs both gates</text>
</svg>
