<svg class="dgm" viewBox="0 0 720 250" role="img" aria-label="Storyboard: scene one, an instrument cluster with the check-engine light glowing; scene two, a diagnostic tester plugged into the OBD-II port querying the engine, ABS and airbag ECUs, with the engine ECU flagged at fault">
  <defs>
    <radialGradient id="celglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--warn)" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="var(--warn)" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="var(--warn)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ===== Scene 1: dashboard + check-engine light ===== -->
  <rect x="20" y="34" width="224" height="150" rx="11" class="fl ln" stroke-width="1.5"/>
  <path d="M64.89 141.11 L61.81 137.69 L59.1 133.96 L56.8 129.98 L54.92 125.77 L53.5 121.39 L52.54 116.88 L52.06 112.3 L52.06 107.7 L52.54 103.12 L53.5 98.61 L54.92 94.23 L56.8 90.02 L59.1 86.04 L61.81 82.31 L64.89 78.89 L68.31 75.81 L72.04 73.1 L76.02 70.8 L80.23 68.92 L84.61 67.5 L89.12 66.54 L93.7 66.06 L98.3 66.06 L102.88 66.54 L107.39 67.5 L111.77 68.92 L115.98 70.8 L119.96 73.1 L123.69 75.81 L127.11 78.89 L130.19 82.31 L132.9 86.04 L135.2 90.02 L137.08 94.23 L138.5 98.61 L139.46 103.12 L139.94 107.7 L139.94 112.3 L139.46 116.88 L138.5 121.39 L137.08 125.77 L135.2 129.98 L132.9 133.96 L130.19 137.69 L127.11 141.11 " class="ln" stroke-width="2" fill="none"/>
  <line x1="69.84" y1="136.16" x2="64.89" y2="141.11" class="ln" stroke-width="1.4"/><line x1="60.81" y1="121.43" x2="54.15" y2="123.6" class="ln" stroke-width="1.4"/><line x1="59.46" y1="104.21" x2="52.54" y2="103.12" class="ln" stroke-width="1.4"/><line x1="66.07" y1="88.25" x2="60.4" y2="84.14" class="ln" stroke-width="1.4"/><line x1="79.2" y1="77.03" x2="76.02" y2="70.8" class="ln" stroke-width="1.4"/><line x1="96" y1="73" x2="96" y2="66" class="ln" stroke-width="1.4"/><line x1="112.8" y1="77.03" x2="115.98" y2="70.8" class="ln" stroke-width="1.4"/><line x1="125.93" y1="88.25" x2="131.6" y2="84.14" class="ln" stroke-width="1.4"/><line x1="132.54" y1="104.21" x2="139.46" y2="103.12" class="ln" stroke-width="1.4"/><line x1="131.19" y1="121.43" x2="137.85" y2="123.6" class="ln" stroke-width="1.4"/><line x1="122.16" y1="136.16" x2="127.11" y2="141.11" class="ln" stroke-width="1.4"/>
  <line x1="96" y1="110" x2="74.8" y2="86.46" class="acc-s" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="96" cy="110" r="3.4" class="acc"/>
  <text x="96" y="141" text-anchor="middle" class="mut mono-t" font-size="9">km/h</text>
  <circle cx="182" cy="110" r="31" fill="url(#celglow)"><animate attributeName="opacity" values="0.55;1;0.55" dur="1.6s" repeatCount="indefinite"/></circle>
  <g class="amb">
    <rect x="169" y="104" width="26" height="15" rx="1.5"/>
    <rect x="174" y="97" width="15" height="7" rx="1.5"/>
    <rect x="180" y="92" width="6" height="5" rx="1"/>
    <circle cx="166" cy="112" r="5"/>
    <rect x="195" y="107" width="5" height="10" rx="1"/>
    <rect x="200" y="105.5" width="4" height="3.4" rx="0.6"/>
    <rect x="200" y="109.7" width="4" height="3.4" rx="0.6"/>
    <rect x="200" y="113.9" width="4" height="3.4" rx="0.6"/>
    <rect x="173" y="119" width="5" height="3" rx="0.6"/>
    <rect x="185" y="119" width="5" height="3" rx="0.6"/>
  </g>
  <text x="182" y="147" text-anchor="middle" class="amb mono-t" font-size="8.5" letter-spacing="0.5">CHECK ENGINE</text>
  <text x="132" y="208" text-anchor="middle" class="ink w7" font-size="12.5">① The car flags a fault</text>
  <text x="132" y="226" text-anchor="middle" class="mut" font-size="11">車が異常を知らせる</text>

  <!-- ===== flow divider: own padded lane (binnacle 244 · tester 312) ===== -->
  <text x="278" y="95" text-anchor="middle" class="mut mono-t" font-size="8">then · 次に</text>
  <path d="M 265 110 H 289 M 284 105 L 294 110 L 284 115" class="acc-s" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== Scene 2: tester → OBD-II → ECUs ===== -->
  <rect x="312" y="52" width="76" height="120" rx="9" class="plate ln" stroke-width="1.7"/>
  <rect x="323" y="63" width="54" height="46" rx="3" fill="#0d1013"/>
  <text x="350" y="82" text-anchor="middle" class="mono-t" font-size="11" fill="#dea945">SCAN</text>
  <path d="M 329 97 l 6 -7 l 6 9 l 6 -11 l 6 9 l 4 -4" fill="none" stroke="#dea945" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="334" cy="150" r="4.5" class="lnf"/><circle cx="350" cy="150" r="4.5" class="lnf"/><circle cx="366" cy="150" r="4.5" class="lnf"/>
  <text x="350" y="187" text-anchor="middle" class="mut" font-size="10.5">Tester · テスター</text>

  <path d="M 388 140 C 419 150 438 124 456 122" class="acc-s" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 454 112 H 484 L 480 132 H 458 Z" class="fl ln" stroke-width="1.4"/>
  <line x1="460" y1="119" x2="478" y2="119" class="ln" stroke-width="2.6"/>
  <line x1="461" y1="125" x2="477" y2="125" class="ln" stroke-width="2.6"/>
  <text x="469" y="147" text-anchor="middle" class="mut mono-t" font-size="9">OBD-II</text>
  <path d="M 482 122 L 570 73" class="ln" stroke-width="1.3" fill="none"/><path d="M 482 122 L 570 119" class="ln" stroke-width="1.3" fill="none"/><path d="M 482 122 L 570 165" class="ln" stroke-width="1.3" fill="none"/>
  <rect x="570" y="56" width="134" height="34" rx="4" class="fl" fill="var(--warn-bg)" stroke="var(--warn)" stroke-width="1.6"/>
      <text x="583" y="77.5" class="amb w7 mono-t" font-size="13.5">Engine</text>
      <g><path d="M 684 66 L 691 79 L 677 79 Z" class="amb"/>
        <text x="684" y="78" text-anchor="middle" font-size="8.5" font-weight="700" fill="#160c04">!</text>
        <animate attributeName="opacity" values="1;0.3;1" dur="1.1s" repeatCount="indefinite"/></g><rect x="570" y="102" width="134" height="34" rx="4" class="plate ln" stroke-width="1.3"/>
      <text x="583" y="123.5" class="ink w7 mono-t" font-size="13.5">ABS</text>
      <path d="M 678 119 l 4 5 l 9 -11" class="grn-s" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="570" y="148" width="134" height="34" rx="4" class="plate ln" stroke-width="1.3"/>
      <text x="583" y="169.5" class="ink w7 mono-t" font-size="13.5">Airbag</text>
      <path d="M 678 165 l 4 5 l 9 -11" class="grn-s" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle r="3.4" class="acc"><animateMotion dur="2.4s" repeatCount="indefinite" path="M 388 140 C 419 150 438 124 456 122 L 482 122 L 570 73"/><animate attributeName="opacity" values="0;1;1;1;0" dur="2.4s" repeatCount="indefinite"/></circle>
  <text x="508" y="208" text-anchor="middle" class="ink w7" font-size="12.5">② A tester asks the ECUs</text>
  <text x="508" y="226" text-anchor="middle" class="mut" font-size="11">テスターがECUに尋ねる</text>
</svg>
